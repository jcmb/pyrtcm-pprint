name: Build binaries

on:
  push:
    branches:
      - main
      - "cursor/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
          - target: macos-arm64
            os: macos-26
          - target: linux-amd64
            os: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyrtcm==1.1.12 textual

      - name: Build executable
        run: |
          pyinstaller --clean --onedir --name rtcm-pprint --paths src --hidden-import rtcmtui --collect-all textual src/rtcm-pprint.py

      - name: Prepare artifact
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          python - <<'PY'
          import os
          import shutil
          import textwrap
          from pathlib import Path

          target = os.environ["BUILD_TARGET"]
          exe_name = "rtcm-pprint.exe" if os.name == "nt" else "rtcm-pprint"
          bundle_dir = Path("dist") / "rtcm-pprint"
          executable = bundle_dir / exe_name
          if not executable.exists():
              raise FileNotFoundError(f"Expected executable not found: {executable}")

          package_dir = Path("package")
          if package_dir.exists():
              shutil.rmtree(package_dir)
          package_dir.mkdir(exist_ok=True)
          shutil.copytree(bundle_dir, package_dir / "rtcm-pprint")

          if target == "macos-arm64":
              script = package_dir / "clear-quarantine.sh"
              script.write_text(
                  textwrap.dedent("""\
          #!/usr/bin/env bash
          set -euo pipefail

          script_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          target="${1:-${script_dir}/rtcm-pprint/rtcm-pprint}"

          xattr -dr com.apple.quarantine "$target" 2>/dev/null || true
          echo "Cleared quarantine attributes from $target"
          """),
                  encoding="utf-8",
              )
              script.chmod(0o755)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtcm-pprint-${{ matrix.target }}
          path: package/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release archives
        run: |
          set -euo pipefail
          mkdir -p release
          for dir in artifacts/rtcm-pprint-*; do
            target="$(basename "$dir")"
            (cd "$dir" && zip -r "../../release/${target}.zip" .)
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
