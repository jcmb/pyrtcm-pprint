name: Build binaries

on:
  push:
    branches:
      - main
      - "cursor/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
          - target: macos-arm64
            os: macos-26
          - target: linux-amd64
            os: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyrtcm==1.1.12

      - name: Build executable
        run: |
          pyinstaller --clean --onefile --name rtcm-pprint --paths src src/rtcm-pprint.py

      - name: Prepare artifact
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          target = os.environ["BUILD_TARGET"]
          exe_name = "rtcm-pprint.exe" if os.name == "nt" else "rtcm-pprint"
          executable = Path("dist") / exe_name
          if not executable.exists():
              raise FileNotFoundError(f"Expected executable not found: {executable}")

          package_dir = Path("package")
          package_dir.mkdir(exist_ok=True)
          suffix = executable.suffix
          shutil.copy2(executable, package_dir / f"rtcm-pprint-{target}{suffix}")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtcm-pprint-${{ matrix.target }}
          path: package/*
          if-no-files-found: error
